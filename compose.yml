services:
  db:
    image: postgres:15-alpine
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin_user -d metrics_db']
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: network_password
      POSTGRES_DB: metrics_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
